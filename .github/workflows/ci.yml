name: CI Pipeline

on:
    push:
        branches:
            - main

    pull_request:
        branches:
            - main

jobs:
    test-build-healthcheck:

        runs-on: ubuntu-latest

        steps:

            - name: Checkout Source Code
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.12"

            - name: Install Poetry
              run: |
                pip install poetry

            - name: Install Dependencies
              run: |
               poetry install --no-interaction --no-ansi --no-root

            - name: Run Unit Tests
              run: |
               poetry run pytest -v

            - name: Build Docker Image
              run: |
                docker build -t system-health-api:latest .
            
            - name: Run Docker Container
              run: |
                docker run -d \ 
                  -p 8000:8000 \
                  --name system-health-api-container \                    
                  system-health-api:latest

            - name: Wait For Application Startup
              run: |
                sleep 15

            - name: Verify Health Endpoint
              run: |
                curl --fail --silent --show-error \ 
                http://localhost:8000/health

            - name: Show Container Logs On Failure
              if: failure() 
              run: |
                docker logs system-health-api-container
              
            - name: Cleanup Container
              if: always()
              run: |
                docker stop system-health-api-container || true
                docker rm system-health-api-container || true

             

            
